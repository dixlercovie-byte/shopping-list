<script>
const STORAGE_KEY = "multiStoreShoppingLists";
const SYNC_CODE_KEY = "multiStoreShoppingListsSyncCode";

const firebaseConfig = {
  apiKey: "AIzaSyCUfESGWMkMMSbWQq0ZsKnayFj79eRba2A",
  authDomain: "shopping-list-e7cf4.firebaseapp.com",
  databaseURL: "https://shopping-list-e7cf4-default-rtdb.firebaseio.com",
  projectId: "shopping-list-e7cf4",
  storageBucket: "shopping-list-e7cf4.firebasestorage.app",
  messagingSenderId: "802851430312",
  appId: "1:802851430312:web:b051cab63ebec95bdec79d",
  measurementId: "G-RC3VBKZF30",
};
firebase.initializeApp(firebaseConfig);

let syncCode = localStorage.getItem(SYNC_CODE_KEY) || null;
let syncRef = null;
let lastSyncedJson = null;

function generateSyncCode() {
  const chars = "abcdefghjkmnpqrstuvwxyz23456789";
  let code = "";
  for (let i = 0; i < 8; i++) {
    code += chars[Math.floor(Math.random() * chars.length)];
  }
  return code;
}

function pushToFirebase() {
  if (!syncRef) return;
  const json = JSON.stringify(data);
  lastSyncedJson = json;
  syncRef.set(data);
}

function connectSync(code) {
  if (syncRef) syncRef.off();
  syncCode = code;
  localStorage.setItem(SYNC_CODE_KEY, code);
  syncRef = firebase.database().ref("shoppingLists/" + code);

  syncRef.on("value", (snapshot) => {
    const remote = snapshot.val();
    if (remote) {
      const remoteJson = JSON.stringify(remote);
      if (remoteJson === lastSyncedJson) return;
      try {
        data = normalizeData(remote);
        lastSyncedJson = remoteJson;
        editingIdx = null;
        render();
      } catch (e) {
        console.warn("Ignored bad remote sync data:", e);
      }
    } else {
      pushToFirebase();
    }
  });
}

function disconnectSync() {
  if (syncRef) syncRef.off();
  syncRef = null;
  syncCode = null;
  lastSyncedJson = null;
  localStorage.removeItem(SYNC_CODE_KEY);
}

const CATEGORIES = [
  "Produce",
  "Dairy & Eggs",
  "Bakery",
  "Meat & Seafood",
  "Pantry & Dry Goods",
  "Snacks",
  "Beverages",
  "Frozen",
  "Household",
  "Other",
];

function defaultData() {
  const item = (name, qty, category) => ({ name, qty, category: category || "Other", checked: false });
  return {
    stores: {
      "Aldi": { items: [
        item("Eggs", 3, "Dairy & Eggs"),
        item("Milk", 1, "Dairy & Eggs"),
        item("Peanuts", 1, "Snacks"),
        item("Almonds", 1, "Snacks"),
        item("Raisins", 1, "Snacks"),
        item("Round crackers", 1, "Snacks"),
        item("Saltine crackers", 1, "Snacks"),
        item("Peanut butter bar", 1, "Snacks"),
        item("Cookies", 2, "Snacks"),
        item("Bread", 1, "Bakery"),
        item("Bagels", 1, "Bakery"),
        item("Bananas (1 bunch)", 1, "Produce"),
        item("Coleslaw mix", 2, "Produce"),
        item("Mushrooms", 2, "Produce"),
        item("Zucchini", 2, "Produce"),
        item("Cucumbers", 1, "Produce"),
        item("Baby carrots", 3, "Produce"),
        item("Baby potatoes", 1, "Produce"),
        item("Yukon gold potatoes", 1, "Produce"),
        item("Fruit for dessert (cantaloupe/grapes/cherries)", 1, "Produce"),
        item("Canned tuna", 6, "Pantry & Dry Goods"),
        item("Brown sugar", 1, "Pantry & Dry Goods"),
        item("Sugar", 1, "Pantry & Dry Goods"),
        item("Flour", 1, "Pantry & Dry Goods"),
        item("Fake sugar packets", 1, "Pantry & Dry Goods"),
        item("Oil", 1, "Pantry & Dry Goods"),
        item("Olive", 1, "Pantry & Dry Goods"),
        item("Instant coffee", 1, "Beverages"),
        item("Coffee grounds", 1, "Beverages"),
        item("Plain Greek yogurt", 2, "Dairy & Eggs"),
        item("100 calorie yogurts (blueberry/strawberry only)", 4, "Dairy & Eggs"),
        item("Cottage cheese", 2, "Dairy & Eggs"),
        item("Lime yogurt", 1, "Dairy & Eggs"),
      ], history: [] },
    },
    activeStore: "Aldi",
    sortMode: {},
    historyView: {},
  };
}

function getWeekInfo(date) {
  const d = new Date(date);
  const day = d.getDay();
  const sunday = new Date(d);
  sunday.setDate(d.getDate() - day);
  sunday.setHours(0, 0, 0, 0);
  const saturday = new Date(sunday);
  saturday.setDate(sunday.getDate() + 6);
  const key = sunday.toISOString().slice(0, 10);
  const fmt = (dt) => dt.toLocaleDateString(undefined, { month: "short", day: "numeric" });
  const label = "Week of " + fmt(sunday) + " – " + fmt(saturday);
  return { key, label };
}

function archiveItemToHistory(store, item) {
  const { key, label } = getWeekInfo(new Date());
  let bucket = store.history.find(h => h.week === key);
  if (!bucket) {
    bucket = { week: key, label, items: [] };
    store.history.unshift(bucket);
  }
  bucket.items.push(item);
}

function normalizeData(d) {
  if (!d || typeof d !== "object" || !d.stores || typeof d.stores !== "object") {
    throw new Error("That doesn't look like valid shopping list data.");
  }
  if (!d.sortMode) d.sortMode = {};
  if (!d.historyView) d.historyView = {};
  Object.keys(d.stores).forEach(name => {
    const store = d.stores[name];
    if (Array.isArray(store)) {
      d.stores[name] = { items: store, history: [] };
    } else {
      if (!d.stores[name].items) d.stores[name].items = [];
      if (!d.stores[name].history) d.stores[name].history = [];
    }
  });
  Object.values(d.stores).forEach(store => {
    store.items.forEach(item => {
      if (!item.category) item.category = "Other";
    });
  });
  if (!d.activeStore || !d.stores[d.activeStore]) {
    const names = Object.keys(d.stores);
    d.activeStore = names.length ? names[0] : null;
  }
  return d;
}

function loadData() {
  let d;
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    d = raw ? JSON.parse(raw) : defaultData();
  } catch (e) {
    d = defaultData();
  }
  return normalizeData(d);
}

function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  pushToFirebase();
}

let data = loadData();
let editingIdx = null;

if (syncCode) {
  connectSync(syncCode);
}
let receiptReviewActive = false;
let receiptLoading = false;
let receiptCandidates = null;
let receiptError = null;
let importActive = false;
let searchQuery = "";

function parsePastedList(text) {
  const lines = text.split(/\r?\n/).map(l => l.trim()).filter(Boolean);
  const items = [];
  for (const line of lines) {
    if (/^(shopping list|list)$/i.test(line)) continue;
    if (/^[\w\s]+ shopping list$/i.test(line)) continue;
    const match = line.match(/^(.*?)\s*\(x(\d+)\)\s*$/i);
    if (match) {
      items.push({ name: match[1].trim(), qty: parseInt(match[2], 10) || 1 });
    } else {
      items.push({ name: line, qty: 1 });
    }
  }
  return items.filter(i => i.name);
}

function loadTesseractScript() {
  return new Promise((resolve, reject) => {
    if (window.Tesseract) return resolve();
    const script = document.createElement("script");
    script.src = "https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js";
    script.onload = () => resolve();
    script.onerror = () => reject(new Error("Couldn't load the OCR library — check your internet connection."));
    document.head.appendChild(script);
  });
}

function parseReceiptText(text) {
  const lines = text.split(/\r?\n/).map(l => l.trim()).filter(Boolean);
  const skipPatterns = [
    /^(SUBTOTAL|TOTAL|TAX|CASH|CHANGE|DEBIT|CREDIT|VISA|MASTERCARD|AMEX|DISCOVER|BALANCE|TENDER|APPROVED|AUTH|REF|TERMINAL|MERCHANT|STORE|THANK YOU|CUSTOMER|RECEIPT|SAVINGS|COUPON|ITEMS? SOLD|QTY|AMOUNT|DATE|TIME|ORDER|CASHIER|MEMBER|SURVEY|SIGNATURE)/i,
    /^\d{1,2}[\/\-]\d{1,2}[\/\-]\d{2,4}/,
    /^\(?\d{3}\)?[\s\-]?\d{3}[\s\-]?\d{4}$/,
    /^[\d\s\-\$.,]+$/,
  ];
  const priceTrailingRegex = /\s*\$?\d+\.\d{2}\s*[A-Za-z]?\s*$/;

  const candidates = [];
  for (const line of lines) {
    if (line.length < 2) continue;
    if (skipPatterns.some(p => p.test(line))) continue;
    let cleaned = line.replace(priceTrailingRegex, "").trim();
    cleaned = cleaned.replace(/^\d{4,}\s+/, "");
    cleaned = cleaned.replace(/[^\w\s&'\-.\(\)\/]/g, "").trim();
    if (cleaned.length < 2) continue;
    if (/^\d+$/.test(cleaned)) continue;
    candidates.push(cleaned);
  }
  return [...new Set(candidates)];
}

function renderReceiptReview(store, container) {
  container.innerHTML = "";

  if (receiptLoading) {
    const p = document.createElement("p");
    p.className = "receipt-status";
    p.textContent = "Reading receipt... this can take a moment.";
    container.appendChild(p);
    return;
  }

  if (receiptError) {
    const p = document.createElement("p");
    p.className = "receipt-status";
    p.textContent = receiptError;
    container.appendChild(p);

    const closeBtn = document.createElement("button");
    closeBtn.className = "secondary";
    closeBtn.textContent = "Close";
    closeBtn.addEventListener("click", () => {
      receiptReviewActive = false;
      receiptError = null;
      render();
    });
    container.appendChild(closeBtn);
    return;
  }

  const heading = document.createElement("h2");
  heading.textContent = "Review scanned items";
  container.appendChild(heading);

  if (!receiptCandidates || receiptCandidates.length === 0) {
    const p = document.createElement("p");
    p.className = "receipt-status";
    p.textContent = "Couldn't find any items on that receipt. Try a clearer, well-lit photo.";
    container.appendChild(p);
  } else {
    receiptCandidates.forEach((c, i) => {
      const row = document.createElement("div");
      row.className = "receipt-row" + (c.checked ? "" : " unchecked");

      const checkbox = document.createElement("input");
      checkbox.type = "checkbox";
      checkbox.checked = c.checked;
      checkbox.addEventListener("change", () => {
        c.checked = checkbox.checked;
        row.classList.toggle("unchecked", !c.checked);
      });

      const nameInput = document.createElement("input");
      nameInput.type = "text";
      nameInput.value = c.name;
      nameInput.addEventListener("input", () => {
        c.name = nameInput.value;
      });

      const qtyInput = document.createElement("input");
      qtyInput.type = "number";
      qtyInput.min = "1";
      qtyInput.value = c.qty;
      qtyInput.addEventListener("input", () => {
        c.qty = parseInt(qtyInput.value, 10) || 1;
      });

      row.appendChild(checkbox);
      row.appendChild(nameInput);
      row.appendChild(qtyInput);
      container.appendChild(row);
    });
  }

  const actions = document.createElement("div");
  actions.className = "receipt-actions";

  const addBtn = document.createElement("button");
  addBtn.textContent = "Add checked items to list";
  addBtn.addEventListener("click", () => {
    const toAdd = (receiptCandidates || []).filter(c => c.checked && c.name.trim());
    toAdd.forEach(c => {
      store.items.push({ name: c.name.trim(), qty: c.qty || 1, category: "Other", checked: false });
    });
    receiptReviewActive = false;
    receiptCandidates = null;
    saveData();
    render();
  });

  const cancelBtn = document.createElement("button");
  cancelBtn.className = "secondary";
  cancelBtn.textContent = "Cancel";
  cancelBtn.addEventListener("click", () => {
    receiptReviewActive = false;
    receiptCandidates = null;
    render();
  });

  actions.appendChild(addBtn);
  actions.appendChild(cancelBtn);
  container.appendChild(actions);
}

function render() {
  const tabsEl = document.getElementById("storeTabs");
  const storeNames = Object.keys(data.stores);
  tabsEl.innerHTML = "";

  storeNames.forEach(name => {
    const wrap = document.createElement("div");
    wrap.className = "store-tab-wrap";

    const btn = document.createElement("button");
    btn.className = "store-tab" + (name === data.activeStore ? " active" : "");
    btn.textContent = name;
    btn.addEventListener("click", () => {
      data.activeStore = name;
      editingIdx = null;
      receiptReviewActive = false;
      importActive = false;
      searchQuery = "";
      document.getElementById("searchInput").value = "";
      saveData();
      render();
    });

    const deleteBtn = document.createElement("button");
    deleteBtn.className = "store-delete-btn";
    deleteBtn.textContent = "✕";
    deleteBtn.title = "Delete store";
    deleteBtn.addEventListener("click", () => {
      if (!confirm('Delete "' + name + '" and its shopping list? This cannot be undone.')) return;
      delete data.stores[name];
      if (data.activeStore === name) {
        const remaining = Object.keys(data.stores);
        data.activeStore = remaining.length ? remaining[0] : null;
      }
      saveData();
      render();
    });

    wrap.appendChild(btn);
    wrap.appendChild(deleteBtn);
    tabsEl.appendChild(wrap);
  });

  const listSection = document.getElementById("listSection");
  const noStoreMsg = document.getElementById("noStoreMsg");

  if (!data.activeStore || !data.stores[data.activeStore]) {
    listSection.style.display = "none";
    noStoreMsg.style.display = storeNames.length ? "none" : "block";
    if (storeNames.length && !data.activeStore) {
      data.activeStore = storeNames[0];
      saveData();
      render();
    }
    return;
  }

  noStoreMsg.style.display = "none";
  listSection.style.display = "block";
  document.getElementById("printStoreName").textContent = "Shopping List — " + data.activeStore;

  const store = data.stores[data.activeStore];
  const items = store.items;
  const itemsEl = document.getElementById("items");
  itemsEl.innerHTML = "";

  const addItemRow = document.querySelector(".add-item");
  const sortBtn = document.getElementById("sortToggleBtn");
  const newWeekBtn = document.getElementById("newWeekBtn");
  const listActionsEl = document.querySelector(".list-actions");
  const receiptReviewEl = document.getElementById("receiptReview");
  const importViewEl = document.getElementById("importView");

  const searchInputEl = document.getElementById("searchInput");

  if (receiptReviewActive) {
    addItemRow.style.display = "none";
    listActionsEl.style.display = "none";
    itemsEl.style.display = "none";
    importViewEl.style.display = "none";
    searchInputEl.style.display = "none";
    receiptReviewEl.style.display = "block";
    renderReceiptReview(store, receiptReviewEl);
    return;
  }
  receiptReviewEl.style.display = "none";

  if (importActive) {
    addItemRow.style.display = "none";
    listActionsEl.style.display = "none";
    itemsEl.style.display = "none";
    searchInputEl.style.display = "none";
    importViewEl.style.display = "block";
    return;
  }
  importViewEl.style.display = "none";
  listActionsEl.style.display = "flex";

  const inHistoryView = !!data.historyView[data.activeStore];
  const historyBtn = document.getElementById("historyToggleBtn");
  historyBtn.textContent = inHistoryView ? "← Back to list" : "🕘 Past lists";

  addItemRow.style.display = inHistoryView ? "none" : "flex";
  sortBtn.style.display = inHistoryView ? "none" : "inline-block";
  newWeekBtn.style.display = inHistoryView ? "none" : "inline-block";
  searchInputEl.style.display = inHistoryView ? "none" : "block";
  itemsEl.style.display = "block";

  if (inHistoryView) {
    if (!store.history || store.history.length === 0) {
      const li = document.createElement("li");
      li.className = "empty";
      li.textContent = "No past items yet for " + data.activeStore + ".";
      itemsEl.appendChild(li);
      return;
    }

    store.history.forEach(bucket => {
      const header = document.createElement("li");
      header.className = "week-header";
      header.textContent = bucket.label;
      itemsEl.appendChild(header);

      bucket.items.forEach(item => {
        const li = document.createElement("li");

        const nameSpan = document.createElement("span");
        nameSpan.className = "name";
        nameSpan.textContent = item.name;

        const qtySpan = document.createElement("span");
        qtySpan.className = "qty";
        qtySpan.textContent = "x" + item.qty;

        const addBackBtn = document.createElement("button");
        addBackBtn.className = "add-back-btn";
        addBackBtn.textContent = "+";
        addBackBtn.title = "Add back to current list";
        addBackBtn.addEventListener("click", () => {
          store.items.push({ name: item.name, qty: item.qty, category: item.category, checked: false });
          data.historyView[data.activeStore] = false;
          saveData();
          render();
        });

        li.appendChild(nameSpan);
        li.appendChild(qtySpan);
        li.appendChild(addBackBtn);
        itemsEl.appendChild(li);
      });
    });
    return;
  }

  const byCategory = data.sortMode[data.activeStore] === "category";
  sortBtn.textContent = byCategory ? "Sort: By aisle/category" : "Sort: Added order";

  if (items.length === 0) {
    const li = document.createElement("li");
    li.className = "empty";
    li.textContent = "No items yet for " + data.activeStore + ".";
    itemsEl.appendChild(li);
    return;
  }

  const query = searchQuery.trim().toLowerCase();
  const visibleIdx = new Set(
    items
      .map((item, idx) => ({ item, idx }))
      .filter(e => !query || e.item.name.toLowerCase().includes(query))
      .map(e => e.idx)
  );

  if (query && visibleIdx.size === 0) {
    const li = document.createElement("li");
    li.className = "empty";
    li.textContent = "No items match \"" + searchQuery.trim() + "\".";
    itemsEl.appendChild(li);
    return;
  }

  function makeItemRow(item, idx) {
    const li = document.createElement("li");

    if (editingIdx === idx) {
      li.className = "edit-row";

      const nameInput = document.createElement("input");
      nameInput.type = "text";
      nameInput.value = item.name;

      const qtyInput = document.createElement("input");
      qtyInput.type = "number";
      qtyInput.min = "1";
      qtyInput.value = item.qty;

      const categoryEditSelect = document.createElement("select");
      CATEGORIES.forEach(category => {
        const opt = document.createElement("option");
        opt.value = category;
        opt.textContent = category;
        if (category === (item.category || "Other")) opt.selected = true;
        categoryEditSelect.appendChild(opt);
      });

      const saveBtn = document.createElement("button");
      saveBtn.textContent = "Save";
      saveBtn.addEventListener("click", () => {
        const newName = nameInput.value.trim();
        if (!newName) return;
        item.name = newName;
        item.qty = parseInt(qtyInput.value, 10) || 1;
        item.category = categoryEditSelect.value || "Other";
        editingIdx = null;
        saveData();
        render();
      });

      const cancelBtn = document.createElement("button");
      cancelBtn.className = "secondary";
      cancelBtn.textContent = "Cancel";
      cancelBtn.addEventListener("click", () => {
        editingIdx = null;
        render();
      });

      nameInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") saveBtn.click();
        if (e.key === "Escape") cancelBtn.click();
      });

      li.appendChild(nameInput);
      li.appendChild(qtyInput);
      li.appendChild(categoryEditSelect);
      li.appendChild(saveBtn);
      li.appendChild(cancelBtn);
      return li;
    }

    if (item.checked) li.classList.add("checked");

    const checkbox = document.createElement("input");
    checkbox.type = "checkbox";
    checkbox.checked = !!item.checked;
    checkbox.addEventListener("change", () => {
      item.checked = checkbox.checked;
      saveData();
      render();
    });

    const nameSpan = document.createElement("span");
    nameSpan.className = "name";
    nameSpan.textContent = item.name;

    const qtySpan = document.createElement("span");
    qtySpan.className = "qty";
    qtySpan.textContent = "x" + item.qty;

    const editBtn = document.createElement("button");
    editBtn.className = "edit-btn";
    editBtn.textContent = "✎";
    editBtn.title = "Edit";
    editBtn.addEventListener("click", () => {
      editingIdx = idx;
      render();
    });

    const removeBtn = document.createElement("button");
    removeBtn.className = "remove-btn";
    removeBtn.textContent = "✕";
    removeBtn.title = "Remove";
    removeBtn.addEventListener("click", () => {
      const [removed] = items.splice(idx, 1);
      archiveItemToHistory(store, removed);
      saveData();
      render();
    });

    li.appendChild(checkbox);
    li.appendChild(nameSpan);
    li.appendChild(qtySpan);
    li.appendChild(editBtn);
    li.appendChild(removeBtn);
    return li;
  }

  if (!byCategory) {
    items.forEach((item, idx) => {
      if (!visibleIdx.has(idx)) return;
      itemsEl.appendChild(makeItemRow(item, idx));
    });
    return;
  }

  CATEGORIES.forEach(category => {
    const entries = items
      .map((item, idx) => ({ item, idx }))
      .filter(e => (e.item.category || "Other") === category && visibleIdx.has(e.idx));
    if (entries.length === 0) return;

    const header = document.createElement("li");
    header.className = "category-header";
    header.textContent = category;
    itemsEl.appendChild(header);

    entries.forEach(({ item, idx }) => {
      itemsEl.appendChild(makeItemRow(item, idx));
    });
  });
}

document.getElementById("addStoreBtn").addEventListener("click", () => {
  const input = document.getElementById("newStoreName");
  const name = input.value.trim();
  if (!name) return;
  if (!data.stores[name]) {
    data.stores[name] = { items: [], history: [] };
  }
  data.activeStore = name;
  editingIdx = null;
  receiptReviewActive = false;
  importActive = false;
  searchQuery = "";
  document.getElementById("searchInput").value = "";
  input.value = "";
  saveData();
  render();
});

document.getElementById("newStoreName").addEventListener("keydown", (e) => {
  if (e.key === "Enter") document.getElementById("addStoreBtn").click();
});

const categorySelect = document.getElementById("itemCategory");
CATEGORIES.forEach(category => {
  const opt = document.createElement("option");
  opt.value = category;
  opt.textContent = category;
  categorySelect.appendChild(opt);
});

document.getElementById("addItemBtn").addEventListener("click", () => {
  if (!data.activeStore) return;
  const nameInput = document.getElementById("itemName");
  const qtyInput = document.getElementById("itemQty");
  const name = nameInput.value.trim();
  const qty = parseInt(qtyInput.value, 10) || 1;
  const category = categorySelect.value || "Other";
  if (!name) return;
  data.stores[data.activeStore].items.push({ name, qty, category, checked: false });
  nameInput.value = "";
  qtyInput.value = "1";
  nameInput.focus();
  saveData();
  render();
});

document.getElementById("itemName").addEventListener("keydown", (e) => {
  if (e.key === "Enter") document.getElementById("addItemBtn").click();
});

document.getElementById("printBtn").addEventListener("click", () => {
  window.print();
});

document.getElementById("copyBtn").addEventListener("click", async () => {
  if (!data.activeStore) return;
  const items = data.stores[data.activeStore].items;
  if (!items || items.length === 0) {
    alert("This store's list is empty — nothing to copy.");
    return;
  }

  const lines = [data.activeStore + " Shopping List", ""];
  lines.push(...items.map(item => "- " + item.name + " (x" + item.qty + ")"));
  const text = lines.join("\n");

  const copyBtn = document.getElementById("copyBtn");
  const originalLabel = copyBtn.textContent;
  try {
    await navigator.clipboard.writeText(text);
    copyBtn.textContent = "Copied!";
  } catch (err) {
    copyBtn.textContent = "Copy failed";
  }
  setTimeout(() => {
    copyBtn.textContent = originalLabel;
  }, 1500);
});

document.getElementById("sortToggleBtn").addEventListener("click", () => {
  if (!data.activeStore) return;
  const current = data.sortMode[data.activeStore] === "category" ? "added" : "category";
  data.sortMode[data.activeStore] = current;
  editingIdx = null;
  saveData();
  render();
});

document.getElementById("newWeekBtn").addEventListener("click", () => {
  if (!data.activeStore) return;
  const store = data.stores[data.activeStore];
  if (store.items.length === 0) {
    alert("This list is already empty.");
    return;
  }
  if (!confirm(
    "Start a new week for " + data.activeStore + "? " +
    "This keeps the same list and unchecks everything so you can shop it again."
  )) return;

  store.items.forEach(item => { item.checked = false; });
  editingIdx = null;
  saveData();
  render();
});

document.getElementById("historyToggleBtn").addEventListener("click", () => {
  if (!data.activeStore) return;
  data.historyView[data.activeStore] = !data.historyView[data.activeStore];
  editingIdx = null;
  saveData();
  render();
});

document.getElementById("scanReceiptBtn").addEventListener("click", () => {
  document.getElementById("receiptInput").click();
});

document.getElementById("receiptInput").addEventListener("change", async (e) => {
  const file = e.target.files[0];
  e.target.value = "";
  if (!file || !data.activeStore) return;

  receiptReviewActive = true;
  receiptLoading = true;
  receiptError = null;
  receiptCandidates = null;
  render();

  try {
    await loadTesseractScript();
    const { data: ocrData } = await Tesseract.recognize(file, "eng");
    const names = parseReceiptText(ocrData.text);
    receiptCandidates = names.map(name => ({ name, qty: 1, checked: true }));
  } catch (err) {
    receiptError = "Couldn't read that receipt: " + err.message;
  }
  receiptLoading = false;
  render();
});

document.getElementById("importListBtn").addEventListener("click", () => {
  if (!data.activeStore) return;
  document.getElementById("importTextarea").value = "";
  importActive = true;
  render();
  document.getElementById("importTextarea").focus();
});

document.getElementById("importAddBtn").addEventListener("click", () => {
  if (!data.activeStore) return;
  const textarea = document.getElementById("importTextarea");
  const parsed = parsePastedList(textarea.value);
  if (parsed.length === 0) {
    alert("Didn't find any items in that text.");
    return;
  }
  const store = data.stores[data.activeStore];
  parsed.forEach(p => {
    store.items.push({ name: p.name, qty: p.qty, category: "Other", checked: false });
  });
  importActive = false;
  saveData();
  render();
});

document.getElementById("importCancelBtn").addEventListener("click", () => {
  importActive = false;
  render();
});

document.getElementById("searchInput").addEventListener("input", (e) => {
  searchQuery = e.target.value;
  render();
});

let syncMode = null;

function showSyncView(mode) {
  syncMode = mode;
  const view = document.getElementById("syncView");
  const instructions = document.getElementById("syncInstructions");
  const textarea = document.getElementById("syncTextarea");
  const primaryBtn = document.getElementById("syncPrimaryBtn");

  view.style.display = "block";

  if (mode === "export") {
    instructions.textContent =
      "Copy this text, then paste it into \"Import all data\" on your other device.";
    textarea.value = JSON.stringify(data);
    textarea.readOnly = true;
    primaryBtn.textContent = "Copy to clipboard";
  } else {
    instructions.textContent =
      "Paste data exported from another device here, then load it. This replaces everything currently in this browser.";
    textarea.value = "";
    textarea.readOnly = false;
    primaryBtn.textContent = "Load this data";
  }
}

function hideSyncView() {
  syncMode = null;
  document.getElementById("syncView").style.display = "none";
}

document.getElementById("exportDataBtn").addEventListener("click", () => {
  showSyncView("export");
});

document.getElementById("importDataBtn").addEventListener("click", () => {
  showSyncView("import");
});

document.getElementById("syncCancelBtn").addEventListener("click", () => {
  hideSyncView();
});

document.getElementById("syncPrimaryBtn").addEventListener("click", async () => {
  const textarea = document.getElementById("syncTextarea");
  const primaryBtn = document.getElementById("syncPrimaryBtn");

  if (syncMode === "export") {
    try {
      await navigator.clipboard.writeText(textarea.value);
      const original = primaryBtn.textContent;
      primaryBtn.textContent = "Copied!";
      setTimeout(() => { primaryBtn.textContent = original; }, 1500);
    } catch (err) {
      alert("Couldn't copy automatically — select the text and copy it manually.");
    }
    return;
  }

  if (!confirm("Replace all shopping list data in this browser with what you pasted? This can't be undone.")) return;
  try {
    const parsed = normalizeData(JSON.parse(textarea.value));
    data = parsed;
    editingIdx = null;
    receiptReviewActive = false;
    importActive = false;
    searchQuery = "";
    document.getElementById("searchInput").value = "";
    saveData();
    hideSyncView();
    render();
  } catch (err) {
    alert("Couldn't load that data: " + err.message);
  }
});

function renderCloudSyncView() {
  const status = document.getElementById("cloudSyncStatus");
  const disconnectedEl = document.getElementById("cloudSyncDisconnected");
  const connectedEl = document.getElementById("cloudSyncConnected");

  if (syncCode) {
    status.textContent = "This device is syncing live.";
    disconnectedEl.style.display = "none";
    connectedEl.style.display = "block";
    document.getElementById("cloudSyncCode").textContent = syncCode;
  } else {
    status.textContent = "Not syncing yet.";
    disconnectedEl.style.display = "block";
    connectedEl.style.display = "none";
  }
}

document.getElementById("cloudSyncBtn").addEventListener("click", () => {
  document.getElementById("cloudSyncView").style.display = "block";
  renderCloudSyncView();
});

document.getElementById("cloudSyncCloseBtn").addEventListener("click", () => {
  document.getElementById("cloudSyncView").style.display = "none";
});

document.getElementById("startSyncBtn").addEventListener("click", () => {
  const code = generateSyncCode();
  connectSync(code);
  pushToFirebase();
  renderCloudSyncView();
});

document.getElementById("joinSyncBtn").addEventListener("click", () => {
  const input = document.getElementById("joinSyncInput");
  const code = input.value.trim().toLowerCase();
  if (!code) return;
  if (!confirm("Join sync code \"" + code + "\"? If that code already has data, it will replace everything in this browser.")) return;
  connectSync(code);
  input.value = "";
  renderCloudSyncView();
});

document.getElementById("copySyncCodeBtn").addEventListener("click", async () => {
  const btn = document.getElementById("copySyncCodeBtn");
  try {
    await navigator.clipboard.writeText(syncCode);
    const original = btn.textContent;
    btn.textContent = "Copied!";
    setTimeout(() => { btn.textContent = original; }, 1500);
  } catch (err) {
    alert("Couldn't copy automatically — the code is: " + syncCode);
  }
});

document.getElementById("stopSyncBtn").addEventListener("click", () => {
  if (!confirm("Stop syncing this device? Your current list stays here, but it will no longer update automatically.")) return;
  disconnectSync();
  renderCloudSyncView();
});

render();

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch((err) => {
      console.warn("Service worker registration failed:", err);
    });
  });
}
</script>

</body>
</html>
