<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Shopping Lists</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="theme-color" content="#4a7dfc">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
  :root {
    color-scheme: light dark;
  }
  body {
    font-family: -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    max-width: 720px;
    margin: 2rem auto;
    padding: 0 1rem;
    background: Canvas;
    color: CanvasText;
  }
  h1 { font-size: 1.5rem; }
  .stores {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-bottom: 1.5rem;
  }
  .store-tab-wrap {
    display: flex;
    align-items: center;
    border: 1px solid #8888;
    border-radius: 999px;
    overflow: hidden;
  }
  .store-tab {
    padding: 0.4rem 0.9rem;
    border: none;
    cursor: pointer;
    background: transparent;
    color: inherit;
    font-size: 0.95rem;
  }
  .store-tab.active {
    background: #4a7dfc;
    color: white;
  }
  .store-delete-btn {
    background: transparent;
    border: none;
    border-left: 1px solid #8888;
    color: #e05555;
    cursor: pointer;
    padding: 0.4rem 0.6rem;
    font-size: 0.85rem;
    line-height: 1;
  }
  .store-tab.active + .store-delete-btn {
    border-left-color: #4a7dfc;
  }
  .add-store {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1.5rem;
  }
  .add-store input {
    flex: 1;
    padding: 0.5rem;
    border: 1px solid #8888;
    border-radius: 6px;
    background: transparent;
    color: inherit;
  }
  .add-item {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1rem;
  }
  .add-item input[type="text"] {
    flex: 3;
    padding: 0.5rem;
    border: 1px solid #8888;
    border-radius: 6px;
    background: transparent;
    color: inherit;
  }
  .add-item input[type="number"] {
    flex: 1;
    width: 4rem;
    padding: 0.5rem;
    border: 1px solid #8888;
    border-radius: 6px;
    background: transparent;
    color: inherit;
  }
  button {
    padding: 0.5rem 1rem;
    border: none;
    border-radius: 6px;
    background: #4a7dfc;
    color: white;
    cursor: pointer;
    font-size: 0.95rem;
  }
  button.secondary {
    background: transparent;
    border: 1px solid #8888;
    color: inherit;
  }
  ul#items {
    list-style: none;
    padding: 0;
  }
  ul#items li {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.5rem 0;
    border-bottom: 1px solid #8884;
  }
  ul#items li.checked span.name {
    text-decoration: line-through;
    opacity: 0.5;
  }
  ul#items li .name {
    flex: 1;
  }
  ul#items li .qty {
    opacity: 0.7;
    font-size: 0.9rem;
  }
  .remove-btn {
    background: transparent;
    border: none;
    color: #e05555;
    cursor: pointer;
    font-size: 1.1rem;
    padding: 0 0.3rem;
  }
  .empty {
    opacity: 0.6;
    font-style: italic;
    padding: 1rem 0;
  }
  .add-item select {
    padding: 0.5rem;
    border: 1px solid #8888;
    border-radius: 6px;
    background: transparent;
    color: inherit;
  }
  .list-actions {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.5rem;
  }
  li.category-header {
    font-weight: bold;
    opacity: 0.7;
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    border-bottom: none !important;
    padding-top: 1rem !important;
  }
  li.category-header:first-child {
    padding-top: 0.3rem !important;
  }
  .add-back-btn {
    background: transparent;
    border: none;
    color: #2f9e44;
    cursor: pointer;
    font-size: 1.2rem;
    padding: 0 0.3rem;
  }
  .edit-btn {
    background: transparent;
    border: none;
    color: inherit;
    opacity: 0.6;
    cursor: pointer;
    font-size: 1rem;
    padding: 0 0.3rem;
  }
  .edit-row {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    flex-wrap: wrap;
  }
  .edit-row input[type="text"] {
    flex: 2;
    min-width: 0;
    padding: 0.4rem;
    border: 1px solid #8888;
    border-radius: 6px;
    background: transparent;
    color: inherit;
  }
  .edit-row input[type="number"] {
    width: 3.5rem;
    padding: 0.4rem;
    border: 1px solid #8888;
    border-radius: 6px;
    background: transparent;
    color: inherit;
  }
  .edit-row select {
    padding: 0.4rem;
    border: 1px solid #8888;
    border-radius: 6px;
    background: transparent;
    color: inherit;
  }
  .edit-row button {
    padding: 0.4rem 0.7rem;
    font-size: 0.85rem;
  }
  .calendar-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0.75rem;
  }
  .calendar-nav button {
    padding: 0.35rem 0.7rem;
  }
  .calendar-nav .month-label {
    font-weight: bold;
  }
  .calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  }
  .calendar-daylabel {
    text-align: center;
    font-size: 0.75rem;
    opacity: 0.6;
    padding-bottom: 0.25rem;
  }
  .calendar-day {
    position: relative;
    aspect-ratio: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border-radius: 6px;
    font-size: 0.85rem;
    border: 1px solid transparent;
  }
  .calendar-day.other-month {
    opacity: 0.3;
  }
  .calendar-day.has-history {
    background: #4a7dfc22;
    border-color: #4a7dfc;
    cursor: pointer;
    font-weight: bold;
  }
  .calendar-day.has-history:hover {
    background: #4a7dfc44;
  }
  .calendar-day .item-badge {
    font-size: 0.65rem;
    opacity: 0.8;
  }
  .calendar-back {
    background: transparent;
    border: 1px solid #8888;
    color: inherit;
    margin-bottom: 0.75rem;
  }
  .print-only {
    display: none;
  }
  @media print {
    .add-store, #storeTabs, .add-item, .remove-btn, .list-actions, h1, #noStoreMsg, #calendarView {
      display: none !important;
    }
    .print-only {
      display: block;
    }
    ul#items li input[type="checkbox"] {
      transform: scale(1.2);
    }
  }
</style>
</head>
<body>

<h1>Shopping Lists</h1>

<div class="add-store">
  <input type="text" id="newStoreName" placeholder="New store name (e.g. Costco)">
  <button id="addStoreBtn">Add Store</button>
</div>

<div class="stores" id="storeTabs"></div>

<div id="listSection" style="display:none;">
  <div class="add-item">
    <input type="text" id="itemName" placeholder="What do you need to buy?">
    <input type="number" id="itemQty" min="1" value="1">
    <select id="itemCategory"></select>
    <button id="addItemBtn">Add</button>
  </div>
  <div class="list-actions">
    <div>
      <button id="sortToggleBtn" class="secondary">Sort: Added order</button>
      <button id="historyToggleBtn" class="secondary">📅 Calendar</button>
      <button id="newWeekBtn" class="secondary">🗓️ Start new week</button>
    </div>
    <div>
      <button id="copyBtn" class="secondary">📋 Copy list</button>
      <button id="printBtn" class="secondary">🖨 Print this list</button>
    </div>
  </div>
  <h2 id="printStoreName" class="print-only"></h2>
  <ul id="items"></ul>
  <div id="calendarView" style="display:none;"></div>
</div>
<div id="noStoreMsg" class="empty">Add a store above to start a shopping list.</div>

<script>
const STORAGE_KEY = "multiStoreShoppingLists";

const CATEGORIES = [
  "Produce",
  "Dairy & Eggs",
  "Bakery",
  "Meat & Seafood",
  "Pantry & Dry Goods",
  "Snacks",
  "Beverages",
  "Frozen",
  "Household",
  "Other",
];

function defaultData() {
  const item = (name, qty, category) => ({ name, qty, category: category || "Other", checked: false });
  return {
    stores: {
      "Aldi": { items: [
        item("Eggs", 3, "Dairy & Eggs"),
        item("Milk", 1, "Dairy & Eggs"),
        item("Peanuts", 1, "Snacks"),
        item("Almonds", 1, "Snacks"),
        item("Raisins", 1, "Snacks"),
        item("Round crackers", 1, "Snacks"),
        item("Saltine crackers", 1, "Snacks"),
        item("Peanut butter bar", 1, "Snacks"),
        item("Cookies", 2, "Snacks"),
        item("Bread", 1, "Bakery"),
        item("Bagels", 1, "Bakery"),
        item("Bananas (1 bunch)", 1, "Produce"),
        item("Coleslaw mix", 2, "Produce"),
        item("Mushrooms", 2, "Produce"),
        item("Zucchini", 2, "Produce"),
        item("Cucumbers", 1, "Produce"),
        item("Baby carrots", 3, "Produce"),
        item("Baby potatoes", 1, "Produce"),
        item("Yukon gold potatoes", 1, "Produce"),
        item("Fruit for dessert (cantaloupe/grapes/cherries)", 1, "Produce"),
        item("Canned tuna", 6, "Pantry & Dry Goods"),
        item("Brown sugar", 1, "Pantry & Dry Goods"),
        item("Sugar", 1, "Pantry & Dry Goods"),
        item("Flour", 1, "Pantry & Dry Goods"),
        item("Fake sugar packets", 1, "Pantry & Dry Goods"),
        item("Oil", 1, "Pantry & Dry Goods"),
        item("Olive", 1, "Pantry & Dry Goods"),
        item("Instant coffee", 1, "Beverages"),
        item("Coffee grounds", 1, "Beverages"),
        item("Plain Greek yogurt", 2, "Dairy & Eggs"),
        item("100 calorie yogurts (blueberry/strawberry only)", 4, "Dairy & Eggs"),
        item("Cottage cheese", 2, "Dairy & Eggs"),
        item("Lime yogurt", 1, "Dairy & Eggs"),
      ], history: [] },
    },
    activeStore: "Aldi",
    sortMode: {},
    historyView: {},
  };
}

function getWeekInfo(date) {
  const d = new Date(date);
  const day = d.getDay();
  const sunday = new Date(d);
  sunday.setDate(d.getDate() - day);
  sunday.setHours(0, 0, 0, 0);
  const saturday = new Date(sunday);
  saturday.setDate(sunday.getDate() + 6);
  const key = sunday.toISOString().slice(0, 10);
  const fmt = (dt) => dt.toLocaleDateString(undefined, { month: "short", day: "numeric" });
  const label = "Week of " + fmt(sunday) + " – " + fmt(saturday);
  return { key, label };
}

function archiveItemToHistory(store, item) {
  const { key, label } = getWeekInfo(new Date());
  let bucket = store.history.find(h => h.week === key);
  if (!bucket) {
    bucket = { week: key, label, items: [] };
    store.history.unshift(bucket);
  }
  bucket.items.push(item);
}

function loadData() {
  let d;
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    d = raw ? JSON.parse(raw) : defaultData();
  } catch (e) {
    d = defaultData();
  }
  if (!d.sortMode) d.sortMode = {};
  if (!d.historyView) d.historyView = {};
  Object.keys(d.stores).forEach(name => {
    const store = d.stores[name];
    if (Array.isArray(store)) {
      d.stores[name] = { items: store, history: [] };
    } else {
      if (!d.stores[name].items) d.stores[name].items = [];
      if (!d.stores[name].history) d.stores[name].history = [];
    }
  });
  Object.values(d.stores).forEach(store => {
    store.items.forEach(item => {
      if (!item.category) item.category = "Other";
    });
  });
  return d;
}

function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

let data = loadData();
let editingIdx = null;
let calendarMonthOffset = 0;
let selectedWeekKey = null;

function getMonthGrid(year, month) {
  const firstOfMonth = new Date(year, month, 1);
  const startDay = firstOfMonth.getDay();
  const gridStart = new Date(year, month, 1 - startDay);
  const weeks = [];
  let cursor = new Date(gridStart);
  for (let w = 0; w < 6; w++) {
    const days = [];
    for (let i = 0; i < 7; i++) {
      days.push(new Date(cursor));
      cursor.setDate(cursor.getDate() + 1);
    }
    weeks.push(days);
  }
  return weeks;
}

function renderCalendarView(store, container) {
  container.innerHTML = "";

  if (selectedWeekKey) {
    const bucket = store.history.find(h => h.week === selectedWeekKey);
    if (!bucket) {
      selectedWeekKey = null;
      renderCalendarView(store, container);
      return;
    }

    const backBtn = document.createElement("button");
    backBtn.className = "calendar-back";
    backBtn.textContent = "← Back to calendar";
    backBtn.addEventListener("click", () => {
      selectedWeekKey = null;
      render();
    });
    container.appendChild(backBtn);

    const heading = document.createElement("h2");
    heading.textContent = bucket.label;
    container.appendChild(heading);

    const ul = document.createElement("ul");
    if (bucket.items.length === 0) {
      const li = document.createElement("li");
      li.className = "empty";
      li.textContent = "No items in this week.";
      ul.appendChild(li);
    }
    bucket.items.forEach(item => {
      const li = document.createElement("li");

      const nameSpan = document.createElement("span");
      nameSpan.className = "name";
      nameSpan.textContent = item.name;

      const qtySpan = document.createElement("span");
      qtySpan.className = "qty";
      qtySpan.textContent = "x" + item.qty;

      const addBackBtn = document.createElement("button");
      addBackBtn.className = "add-back-btn";
      addBackBtn.textContent = "+";
      addBackBtn.title = "Add back to current list";
      addBackBtn.addEventListener("click", () => {
        store.items.push({ name: item.name, qty: item.qty, category: item.category, checked: false });
        saveData();
        render();
      });

      li.appendChild(nameSpan);
      li.appendChild(qtySpan);
      li.appendChild(addBackBtn);
      ul.appendChild(li);
    });
    container.appendChild(ul);
    return;
  }

  const today = new Date();
  const base = new Date(today.getFullYear(), today.getMonth() + calendarMonthOffset, 1);
  const year = base.getFullYear();
  const month = base.getMonth();

  const nav = document.createElement("div");
  nav.className = "calendar-nav";

  const prevBtn = document.createElement("button");
  prevBtn.className = "secondary";
  prevBtn.textContent = "←";
  prevBtn.addEventListener("click", () => {
    calendarMonthOffset -= 1;
    render();
  });

  const label = document.createElement("span");
  label.className = "month-label";
  label.textContent = base.toLocaleDateString(undefined, { month: "long", year: "numeric" });

  const nextBtn = document.createElement("button");
  nextBtn.className = "secondary";
  nextBtn.textContent = "→";
  nextBtn.addEventListener("click", () => {
    calendarMonthOffset += 1;
    render();
  });

  nav.appendChild(prevBtn);
  nav.appendChild(label);
  nav.appendChild(nextBtn);
  container.appendChild(nav);

  const grid = document.createElement("div");
  grid.className = "calendar-grid";

  ["Su", "Mo", "Tu", "We", "Th", "Fr", "Sa"].forEach(d => {
    const el = document.createElement("div");
    el.className = "calendar-daylabel";
    el.textContent = d;
    grid.appendChild(el);
  });

  const weeks = getMonthGrid(year, month);
  weeks.forEach(days => {
    const weekKey = getWeekInfo(days[0]).key;
    const bucket = store.history.find(h => h.week === weekKey);

    days.forEach(day => {
      const cell = document.createElement("div");
      cell.className = "calendar-day";
      if (day.getMonth() !== month) cell.classList.add("other-month");

      const dayNum = document.createElement("span");
      dayNum.textContent = day.getDate();
      cell.appendChild(dayNum);

      if (bucket) {
        cell.classList.add("has-history");
        const badge = document.createElement("span");
        badge.className = "item-badge";
        badge.textContent = bucket.items.length + " item" + (bucket.items.length === 1 ? "" : "s");
        cell.appendChild(badge);
        cell.title = bucket.label;
        cell.addEventListener("click", () => {
          selectedWeekKey = weekKey;
          render();
        });
      }

      grid.appendChild(cell);
    });
  });

  container.appendChild(grid);

  if (!store.history || store.history.length === 0) {
    const empty = document.createElement("p");
    empty.className = "empty";
    empty.textContent = "No past items yet for " + data.activeStore + ".";
    container.appendChild(empty);
  }
}

function render() {
  const tabsEl = document.getElementById("storeTabs");
  const storeNames = Object.keys(data.stores);
  tabsEl.innerHTML = "";

  storeNames.forEach(name => {
    const wrap = document.createElement("div");
    wrap.className = "store-tab-wrap";

    const btn = document.createElement("button");
    btn.className = "store-tab" + (name === data.activeStore ? " active" : "");
    btn.textContent = name;
    btn.addEventListener("click", () => {
      data.activeStore = name;
      editingIdx = null;
      calendarMonthOffset = 0;
      selectedWeekKey = null;
      saveData();
      render();
    });

    const deleteBtn = document.createElement("button");
    deleteBtn.className = "store-delete-btn";
    deleteBtn.textContent = "✕";
    deleteBtn.title = "Delete store";
    deleteBtn.addEventListener("click", () => {
      if (!confirm('Delete "' + name + '" and its shopping list? This cannot be undone.')) return;
      delete data.stores[name];
      if (data.activeStore === name) {
        const remaining = Object.keys(data.stores);
        data.activeStore = remaining.length ? remaining[0] : null;
      }
      saveData();
      render();
    });

    wrap.appendChild(btn);
    wrap.appendChild(deleteBtn);
    tabsEl.appendChild(wrap);
  });

  const listSection = document.getElementById("listSection");
  const noStoreMsg = document.getElementById("noStoreMsg");

  if (!data.activeStore || !data.stores[data.activeStore]) {
    listSection.style.display = "none";
    noStoreMsg.style.display = storeNames.length ? "none" : "block";
    if (storeNames.length && !data.activeStore) {
      data.activeStore = storeNames[0];
      saveData();
      render();
    }
    return;
  }

  noStoreMsg.style.display = "none";
  listSection.style.display = "block";
  document.getElementById("printStoreName").textContent = "Shopping List — " + data.activeStore;

  const store = data.stores[data.activeStore];
  const items = store.items;
  const itemsEl = document.getElementById("items");
  itemsEl.innerHTML = "";

  const inHistoryView = !!data.historyView[data.activeStore];
  const historyBtn = document.getElementById("historyToggleBtn");
  historyBtn.textContent = inHistoryView ? "← Back to list" : "📅 Calendar";

  const addItemRow = document.querySelector(".add-item");
  const sortBtn = document.getElementById("sortToggleBtn");
  const newWeekBtn = document.getElementById("newWeekBtn");
  const calendarViewEl = document.getElementById("calendarView");
  addItemRow.style.display = inHistoryView ? "none" : "flex";
  sortBtn.style.display = inHistoryView ? "none" : "inline-block";
  newWeekBtn.style.display = inHistoryView ? "none" : "inline-block";
  itemsEl.style.display = inHistoryView ? "none" : "block";
  calendarViewEl.style.display = inHistoryView ? "block" : "none";

  if (inHistoryView) {
    renderCalendarView(store, calendarViewEl);
    return;
  }

  const byCategory = data.sortMode[data.activeStore] === "category";
  sortBtn.textContent = byCategory ? "Sort: By aisle/category" : "Sort: Added order";

  if (items.length === 0) {
    const li = document.createElement("li");
    li.className = "empty";
    li.textContent = "No items yet for " + data.activeStore + ".";
    itemsEl.appendChild(li);
    return;
  }

  function makeItemRow(item, idx) {
    const li = document.createElement("li");

    if (editingIdx === idx) {
      li.className = "edit-row";

      const nameInput = document.createElement("input");
      nameInput.type = "text";
      nameInput.value = item.name;

      const qtyInput = document.createElement("input");
      qtyInput.type = "number";
      qtyInput.min = "1";
      qtyInput.value = item.qty;

      const categoryEditSelect = document.createElement("select");
      CATEGORIES.forEach(category => {
        const opt = document.createElement("option");
        opt.value = category;
        opt.textContent = category;
        if (category === (item.category || "Other")) opt.selected = true;
        categoryEditSelect.appendChild(opt);
      });

      const saveBtn = document.createElement("button");
      saveBtn.textContent = "Save";
      saveBtn.addEventListener("click", () => {
        const newName = nameInput.value.trim();
        if (!newName) return;
        item.name = newName;
        item.qty = parseInt(qtyInput.value, 10) || 1;
        item.category = categoryEditSelect.value || "Other";
        editingIdx = null;
        saveData();
        render();
      });

      const cancelBtn = document.createElement("button");
      cancelBtn.className = "secondary";
      cancelBtn.textContent = "Cancel";
      cancelBtn.addEventListener("click", () => {
        editingIdx = null;
        render();
      });

      nameInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") saveBtn.click();
        if (e.key === "Escape") cancelBtn.click();
      });

      li.appendChild(nameInput);
      li.appendChild(qtyInput);
      li.appendChild(categoryEditSelect);
      li.appendChild(saveBtn);
      li.appendChild(cancelBtn);
      return li;
    }

    if (item.checked) li.classList.add("checked");

    const checkbox = document.createElement("input");
    checkbox.type = "checkbox";
    checkbox.checked = !!item.checked;
    checkbox.addEventListener("change", () => {
      item.checked = checkbox.checked;
      saveData();
      render();
    });

    const nameSpan = document.createElement("span");
    nameSpan.className = "name";
    nameSpan.textContent = item.name;

    const qtySpan = document.createElement("span");
    qtySpan.className = "qty";
    qtySpan.textContent = "x" + item.qty;

    const editBtn = document.createElement("button");
    editBtn.className = "edit-btn";
    editBtn.textContent = "✎";
    editBtn.title = "Edit";
    editBtn.addEventListener("click", () => {
      editingIdx = idx;
      render();
    });

    const removeBtn = document.createElement("button");
    removeBtn.className = "remove-btn";
    removeBtn.textContent = "✕";
    removeBtn.title = "Remove";
    removeBtn.addEventListener("click", () => {
      const [removed] = items.splice(idx, 1);
      archiveItemToHistory(store, removed);
      saveData();
      render();
    });

    li.appendChild(checkbox);
    li.appendChild(nameSpan);
    li.appendChild(qtySpan);
    li.appendChild(editBtn);
    li.appendChild(removeBtn);
    return li;
  }

  if (!byCategory) {
    items.forEach((item, idx) => {
      itemsEl.appendChild(makeItemRow(item, idx));
    });
    return;
  }

  CATEGORIES.forEach(category => {
    const entries = items
      .map((item, idx) => ({ item, idx }))
      .filter(e => (e.item.category || "Other") === category);
    if (entries.length === 0) return;

    const header = document.createElement("li");
    header.className = "category-header";
    header.textContent = category;
    itemsEl.appendChild(header);

    entries.forEach(({ item, idx }) => {
      itemsEl.appendChild(makeItemRow(item, idx));
    });
  });
}

document.getElementById("addStoreBtn").addEventListener("click", () => {
  const input = document.getElementById("newStoreName");
  const name = input.value.trim();
  if (!name) return;
  if (!data.stores[name]) {
    data.stores[name] = { items: [], history: [] };
  }
  data.activeStore = name;
  editingIdx = null;
  calendarMonthOffset = 0;
  selectedWeekKey = null;
  input.value = "";
  saveData();
  render();
});

document.getElementById("newStoreName").addEventListener("keydown", (e) => {
  if (e.key === "Enter") document.getElementById("addStoreBtn").click();
});

const categorySelect = document.getElementById("itemCategory");
CATEGORIES.forEach(category => {
  const opt = document.createElement("option");
  opt.value = category;
  opt.textContent = category;
  categorySelect.appendChild(opt);
});

document.getElementById("addItemBtn").addEventListener("click", () => {
  if (!data.activeStore) return;
  const nameInput = document.getElementById("itemName");
  const qtyInput = document.getElementById("itemQty");
  const name = nameInput.value.trim();
  const qty = parseInt(qtyInput.value, 10) || 1;
  const category = categorySelect.value || "Other";
  if (!name) return;
  data.stores[data.activeStore].items.push({ name, qty, category, checked: false });
  nameInput.value = "";
  qtyInput.value = "1";
  nameInput.focus();
  saveData();
  render();
});

document.getElementById("itemName").addEventListener("keydown", (e) => {
  if (e.key === "Enter") document.getElementById("addItemBtn").click();
});

document.getElementById("printBtn").addEventListener("click", () => {
  window.print();
});

document.getElementById("copyBtn").addEventListener("click", async () => {
  if (!data.activeStore) return;
  const items = data.stores[data.activeStore].items;
  if (!items || items.length === 0) {
    alert("This store's list is empty — nothing to copy.");
    return;
  }

  const lines = [data.activeStore + " Shopping List", ""];
  lines.push(...items.map(item => "- " + item.name + " (x" + item.qty + ")"));
  const text = lines.join("\n");

  const copyBtn = document.getElementById("copyBtn");
  const originalLabel = copyBtn.textContent;
  try {
    await navigator.clipboard.writeText(text);
    copyBtn.textContent = "Copied!";
  } catch (err) {
    copyBtn.textContent = "Copy failed";
  }
  setTimeout(() => {
    copyBtn.textContent = originalLabel;
  }, 1500);
});

document.getElementById("sortToggleBtn").addEventListener("click", () => {
  if (!data.activeStore) return;
  const current = data.sortMode[data.activeStore] === "category" ? "added" : "category";
  data.sortMode[data.activeStore] = current;
  editingIdx = null;
  saveData();
  render();
});

document.getElementById("historyToggleBtn").addEventListener("click", () => {
  if (!data.activeStore) return;
  data.historyView[data.activeStore] = !data.historyView[data.activeStore];
  editingIdx = null;
  calendarMonthOffset = 0;
  selectedWeekKey = null;
  saveData();
  render();
});

document.getElementById("newWeekBtn").addEventListener("click", () => {
  if (!data.activeStore) return;
  const store = data.stores[data.activeStore];
  if (store.items.length === 0) {
    alert("This list is already empty.");
    return;
  }
  if (!confirm(
    "Start a new week for " + data.activeStore + "? " +
    "This moves all " + store.items.length + " items into this week's history and clears the active list."
  )) return;

  store.items.forEach(item => archiveItemToHistory(store, item));
  store.items = [];
  editingIdx = null;
  saveData();
  render();
});

render();

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch((err) => {
      console.warn("Service worker registration failed:", err);
    });
  });
}
</script>

</body>
</html>
